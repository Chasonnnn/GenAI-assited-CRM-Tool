version = 1
expectations_path = "apps/api/performance/queryproof/plan-expectations.json"

[repository]
root = "."

[database]
admin_url_env = "QUERYPROOF_ADMIN_DATABASE_URL"
application_url_env = "DATABASE_URL"
application_url_scheme = "postgresql+psycopg"
application_role = "crm_queryproof_app"

[lifecycle]
prepare = [
  { argv = ["uv", "sync", "--extra", "test", "--locked"], cwd = "apps/api" },
]
migrate = [
  { argv = ["uv", "run", "python", "-m", "alembic", "upgrade", "head"], cwd = "apps/api" },
]
cleanup = []

[[dependencies]]
id = "crm-deterministic-query-mode"
check = { argv = ["uv", "run", "python", "-m", "scripts.queryproof_consumer", "doctor"], cwd = "apps/api", env = { QUERYPROOF_EXPECTED_SEED_PROFILE = "production" } }

[[seeds]]
id = "queryproof-cluster-role"
phase = "before_migrate"
command = { argv = ["uv", "run", "python", "-m", "scripts.queryproof_consumer", "provision-role"], cwd = "apps/api", env = { QUERYPROOF_EXPECTED_SEED_PROFILE = "production" } }

[[seeds]]
id = "production-shaped-deterministic"
phase = "after_migrate"
command = { argv = ["uv", "run", "python", "-m", "scripts.seed_mock_data"], cwd = "apps/api", env = { SEED_PROFILE = "production", SEED_RANDOM_SEED = "20260713", SEED_REDACT_SUMMARY = "true" } }

[[seeds]]
id = "queryproof-read-only-acl"
phase = "after_migrate"
command = { argv = ["uv", "run", "python", "-m", "scripts.queryproof_consumer", "apply-role-acl"], cwd = "apps/api", env = { QUERYPROOF_EXPECTED_SEED_PROFILE = "production" } }

[[queries]]
id = "surrogates_list_by_stage"
path = "apps/api/performance/queryproof/queries/surrogates_list_by_stage.sql"
critical_route = true
[[queries.cases]]
id = "hot"
captures = [
  { plan = "generic", capture = "estimated" }, { plan = "generic", capture = "analyze" },
  { plan = "custom", capture = "estimated" }, { plan = "custom", capture = "analyze" },
  { plan = "automatic", capture = "estimated" }, { plan = "automatic", capture = "analyze" },
]
parameters = [{ kind = "uuid", value = "00000000-0000-5000-8000-000000000201" }, { kind = "text", value = "new_unread" }]
[[queries.cases]]
id = "cold"
captures = [
  { plan = "generic", capture = "estimated" }, { plan = "generic", capture = "analyze" },
  { plan = "custom", capture = "estimated" }, { plan = "custom", capture = "analyze" },
