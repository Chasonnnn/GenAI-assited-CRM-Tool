[profiles.smoke]
statistics = "analyze"
full_sampling_row_cap = 300000
wal_gating = false

[profiles.smoke.gucs]
work_mem = "4MB"
max_parallel_workers_per_gather = 0
jit = false
seq_page_cost = 1.0
random_page_cost = 4.0
cpu_tuple_cost = 0.01
cpu_index_tuple_cost = 0.005
cpu_operator_cost = 0.0025
effective_cache_size = "4GB"
synchronize_seqscans = false
timezone = "UTC"
track_io_timing = true
compute_query_id = true
pg_stat_statements_track = "all"
pg_stat_statements_track_utility = false

[profiles.production]
statistics = "analyze"
full_sampling_row_cap = 300000
wal_gating = false

[profiles.production.gucs]
work_mem = "4MB"
max_parallel_workers_per_gather = 0
jit = false
seq_page_cost = 1.0
random_page_cost = 4.0
cpu_tuple_cost = 0.01
cpu_index_tuple_cost = 0.005
cpu_operator_cost = 0.0025
effective_cache_size = "4GB"
synchronize_seqscans = false
timezone = "UTC"
track_io_timing = true
compute_query_id = true
pg_stat_statements_track = "all"
pg_stat_statements_track_utility = false

[corpus]
minimum_database_time_percent = 1.0
top_n = 100
critical_routes = [
  "surrogates_list_by_stage", "tasks_open_by_owner", "dashboard_surrogate_counts",
  "dashboard_upcoming_tasks", "analytics_surrogates_by_stage", "workflow_list",
  "workflow_stats", "intelligent_suggestions_rules", "surrogate_search",
  "pipeline_stage_dimension",
]

[privacy]
require_age_encryption = true
statistics_allowlist = [
  "public.automation_workflows.organization_id",
  "public.org_intelligent_suggestion_rules.organization_id",
  "public.pipeline_stages.pipeline_id",
  "public.pipelines.organization_id",
  "public.surrogates.organization_id",
  "public.tasks.organization_id",
  "public.workflow_executions.organization_id",
]

[bencher]
enabled = false
project = "surrogacy-force-crm"
